<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planilhas — Dashboard Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{overflow-x:hidden;width:100%;max-width:100vw}
    :root{
        --bg:#0b0f1a;--bg2:#111827;--card:#151c2c;--card2:#1a2235;--card-hover:#1e2a40;
        --border:#1e293b;--border2:#2a3548;
        --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
        --primary:#6366f1;--primary-glow:rgba(99,102,241,.2);
        --green:#22c55e;--green-bg:rgba(34,197,94,.12);
        --red:#ef4444;--red-bg:rgba(239,68,68,.12);
        --amber:#f59e0b;--amber-bg:rgba(245,158,11,.12);
        --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
        --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,.12);
        --sidebar-w:220px;--radius:14px;--radius-sm:10px;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

    .sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
    .sb-brand{padding:1.2rem 1rem .8rem;display:flex;align-items:center;gap:.55rem}
    .sb-logo{width:30px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700}
    .sb-brand span{font-weight:700;font-size:.95rem}
    .sb-nav{flex:1;padding:.25rem .6rem}
    .sb-nav a{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:var(--radius-sm);color:var(--text2);font-size:.84rem;font-weight:500;text-decoration:none;transition:all .15s;margin-bottom:1px}
    .sb-nav a:hover{background:var(--card2);color:var(--text)}
    .sb-nav a.active{background:var(--primary);color:#fff}
    .sb-nav a i{font-size:1rem;width:18px;text-align:center}
    .sb-nav .divider{border-top:1px solid var(--border);margin:.6rem 0}

    .main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;max-width:calc(100vw - var(--sidebar-w))}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.25rem;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:.5rem;flex-wrap:wrap}
    .topbar-left{display:flex;align-items:center;gap:.75rem}
    .topbar-left h1{font-size:1.1rem;font-weight:700}
    .menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.25rem;cursor:pointer;padding:.25rem}
    .topbar-right{display:flex;align-items:center;gap:.5rem}

    .offline-bar{display:none;align-items:center;justify-content:center;gap:.5rem;padding:.35rem;background:var(--amber-bg);border-bottom:1px solid var(--amber);font-size:.75rem;font-weight:600;color:var(--amber)}
    .offline-bar.show{display:flex}

    .content{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:1rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;transition:box-shadow .2s}
    .card:hover{box-shadow:0 0 20px rgba(0,0,0,.15)}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:.4rem;border:none;border-radius:8px;padding:.4rem .85rem;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.9}
    .btn-secondary{background:var(--card2);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--card-hover);color:var(--text)}
    .btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
    .btn-sm{padding:.3rem .6rem;font-size:.75rem}
    .btn-icon{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;font-size:.9rem}
    .btn-icon:hover{background:var(--card2);color:var(--text);border-color:var(--primary)}

    /* ── Views ── */
    .view{display:none}.view.active{display:block}

    /* ── Template Grid ── */
    .tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.85rem}
    .tpl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .tpl-card:hover{border-color:var(--primary);box-shadow:0 0 25px rgba(99,102,241,.15);transform:translateY(-2px)}
    .tpl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .tpl-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;margin-bottom:.7rem}
    .tpl-name{font-size:.95rem;font-weight:700;margin-bottom:.25rem}
    .tpl-desc{font-size:.75rem;color:var(--text3);line-height:1.4}
    .tpl-badge{position:absolute;top:.7rem;right:.7rem;font-size:.62rem;padding:.12rem .4rem;border-radius:5px;background:var(--primary-glow);color:var(--primary);font-weight:600}

    /* ── Sheets List ── */
    .sheets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem}
    .sheet-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .2s;position:relative}
    .sheet-card:hover{border-color:var(--primary);box-shadow:0 0 20px rgba(99,102,241,.1)}
    .sheet-name{font-size:.9rem;font-weight:700;margin-bottom:.2rem}
    .sheet-desc{font-size:.72rem;color:var(--text3);margin-bottom:.5rem}
    .sheet-meta{display:flex;gap:1rem;font-size:.68rem;color:var(--text3)}
    .sheet-actions{position:absolute;top:.6rem;right:.6rem;display:flex;gap:.3rem}
    .sheet-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem;padding:.2rem;border-radius:4px}
    .sheet-del:hover{color:var(--red)}

    /* ── Spreadsheet Editor ── */
    .editor-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
    .editor-title{font-size:1rem;font-weight:700;flex:1;background:none;border:none;color:var(--text);outline:none;min-width:150px;padding:.2rem .4rem;border-radius:6px}
    .editor-title:focus{background:var(--bg2);border:1px solid var(--primary)}
    .editor-desc{font-size:.78rem;color:var(--text3);background:none;border:none;outline:none;width:100%;padding:.2rem .4rem;border-radius:6px}
    .editor-desc:focus{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
    .editor-tools{display:flex;gap:.3rem;flex-wrap:wrap}

    .grid-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius-sm);max-height:65vh}
    .grid-table{width:100%;border-collapse:collapse;min-width:500px}
    .grid-table th{background:var(--card2);font-size:.72rem;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);font-weight:600;padding:.45rem .6rem;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
    .grid-table th .col-name{background:none;border:none;color:var(--text2);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;outline:none;width:100%;cursor:text}
    .grid-table th .col-name:focus{color:var(--text);background:var(--bg2);border-radius:4px;padding:0 .2rem}
    .grid-table td{padding:0;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
    .grid-table td:last-child{border-right:none}
    .grid-table tr:hover td{background:rgba(99,102,241,.03)}
    .grid-table .row-num{width:40px;text-align:center;font-size:.68rem;color:var(--text3);background:var(--card2);padding:.35rem;border-right:1px solid var(--border);font-weight:600;user-select:none}
    .grid-cell{width:100%;background:none;border:none;color:var(--text);font-size:.82rem;padding:.4rem .6rem;outline:none;font-family:inherit}
    .grid-cell:focus{background:var(--bg2);box-shadow:inset 0 0 0 1.5px var(--primary)}
    .grid-cell.currency{text-align:right;font-variant-numeric:tabular-nums}
    .grid-cell.number{text-align:right;font-variant-numeric:tabular-nums}

    .grid-footer{display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;background:var(--card2);border-top:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);font-size:.72rem;color:var(--text3)}
    .grid-sum{font-weight:700;color:var(--primary)}

    .autosave-indicator{font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:.25rem}
    .autosave-indicator.saved{color:var(--green)}
    .autosave-indicator.saving{color:var(--amber)}

    /* ── Confirm ── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:none;align-items:center;justify-content:center;padding:1rem}
    .confirm-overlay.open{display:flex}
    .confirm-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem;max-width:340px;text-align:center}
    .confirm-box p{font-size:.9rem;margin-bottom:1rem}
    .confirm-actions{display:flex;gap:.5rem;justify-content:center}
    .confirm-actions button{padding:.4rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none}
    .btn-cancel{background:var(--card2);color:var(--text2);border:1px solid var(--border)!important}

    /* ── Modal New Sheet ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:420px;padding:1.5rem}
    .form-group{margin-bottom:.75rem}
    .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--text2);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.3px}
    .form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;color:var(--text);font-size:.85rem;outline:none}
    .form-input:focus{border-color:var(--primary)}
    .btn-submit{width:100%;background:var(--primary);border:none;border-radius:10px;padding:.6rem;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;margin-top:.5rem}

    .toast{position:fixed;bottom:1.25rem;right:1.25rem;padding:.65rem 1rem;border-radius:10px;font-size:.82rem;font-weight:500;color:#fff;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s;max-width:320px}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:#166534;border:1px solid #22c55e}.toast.danger{background:#7f1d1d;border:1px solid #ef4444}.toast.warning{background:#78350f;border:1px solid #f59e0b}

    .empty{text-align:center;padding:3rem 1rem;color:var(--text3)}.empty i{font-size:3rem;display:block;margin-bottom:.8rem;opacity:.3}.empty p{font-size:.85rem;margin-top:.3rem}

    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:95;display:none}
    .sidebar-overlay.open{display:block}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:90;padding:.3rem 0 env(safe-area-inset-bottom,.3rem);justify-content:space-around}
    .bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:.1rem;color:var(--text3);text-decoration:none;font-size:.6rem;font-weight:500;padding:.3rem .35rem;border-radius:8px;transition:color .15s}
    .bottom-nav a i{font-size:1.1rem}
    .bottom-nav a.active{color:var(--primary)}

    /* ── Sort indicators ── */
    .sort-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.7rem;padding:0 .15rem;vertical-align:middle;transition:color .15s}
    .sort-btn:hover,.sort-btn.asc,.sort-btn.desc{color:var(--primary)}
    .sort-btn.desc{transform:rotate(180deg);display:inline-block}
    /* ── Filter row ── */
    .filter-row th{background:var(--bg2);padding:.2rem .3rem;border-bottom:1px solid var(--border)}
    .filter-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.7rem;padding:.2rem .4rem;outline:none}
    .filter-input:focus{border-color:var(--primary)}
    /* ── Conditional colors ── */
    .grid-cell.positive{color:var(--green)!important}
    .grid-cell.negative{color:var(--red)!important}
    /* ── Mini chart ── */
    .mini-chart-wrap{margin-top:.75rem;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;display:none}
    .mini-chart-wrap.show{display:block}
    .mini-chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
    .mini-chart-head span{font-size:.78rem;font-weight:600;color:var(--text2)}
    .mini-chart-canvas{max-height:180px}
    /* ── Formula indicator ── */
    .grid-cell.formula{color:var(--cyan);font-style:italic}
    /* ── Column resize handle ── */
    .col-resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:6;user-select:none}
    .col-resize-handle:hover,.col-resize-handle.active{background:var(--primary);opacity:.4;border-radius:2px}
    .grid-table th{position:relative}

    /* ── Context menu ── */
    .ctx-menu{position:fixed;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:300;min-width:170px;padding:.3rem;display:none}
    .ctx-menu.open{display:block}
    .ctx-menu button{display:flex;align-items:center;gap:.5rem;width:100%;background:none;border:none;padding:.4rem .6rem;border-radius:6px;font-size:.78rem;color:var(--text2);cursor:pointer;text-align:left}
    .ctx-menu button:hover{background:var(--primary-glow);color:var(--primary)}
    .ctx-menu .ctx-divider{border-top:1px solid var(--border);margin:.2rem 0}

    @media(max-width:768px){
        .sidebar{transform:translateX(-100%)}
        .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.3)}
        .main{margin-left:0;max-width:100vw}
        .menu-btn{display:block}
        .bottom-nav{display:flex}
        .content{padding:.75rem;padding-bottom:4.5rem}
        .tpl-grid,.sheets-grid{grid-template-columns:1fr}
        .topbar{padding:.4rem .75rem}
    }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sb-brand"><div class="sb-logo">F</div><span>Financeiro</span></div>
        <nav class="sb-nav">
            <a href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="#" class="active" id="navPlanilhas"><i class="bi bi-table"></i> Planilhas</a>
            <div class="divider"></div>
            <a href="#" id="navLogout"><i class="bi bi-box-arrow-left"></i> Sair</a>
        </nav>
    </aside>

    <div class="main">
        <div class="offline-bar" id="offlineBar"><i class="bi bi-wifi-off"></i> Modo offline</div>
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" id="menuBtn"><i class="bi bi-list"></i></button>
                <h1 id="pageTitle">Planilhas</h1>
            </div>
            <div class="topbar-right" id="topbarRight">
                <div class="search-wrap" style="position:relative"><i class="bi bi-search" style="position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.8rem"></i><input type="text" id="sheetSearch" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.32rem .65rem .32rem 1.9rem;font-size:.78rem;color:var(--text);width:180px;outline:none" placeholder="Buscar planilha…"></div>
                <div style="position:relative;display:inline-block" id="importDropdown">
                    <button class="btn btn-secondary btn-sm" id="btnImport"><i class="bi bi-upload"></i> Importar <i class="bi bi-caret-down-fill" style="font-size:.55rem"></i></button>
                    <div id="importMenu" style="display:none;position:absolute;top:100%;right:0;margin-top:.3rem;background:var(--card);border:1px solid var(--border);border-radius:8px;min-width:170px;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.3)">
                        <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:flex-start;border:0;border-radius:0;padding:.5rem .7rem" id="btnImportCSV"><i class="bi bi-filetype-csv"></i> Importar CSV</button>
                        <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:flex-start;border:0;border-radius:0;padding:.5rem .7rem" id="btnImportJSON"><i class="bi bi-filetype-json"></i> Importar JSON</button>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm" id="btnNewSheet"><i class="bi bi-plus-lg"></i> Nova Planilha</button>
            </div>
        </header>

        <div class="content">
            <!-- VIEW: LIST -->
            <div class="view active" id="viewList">
                <div style="margin-bottom:.75rem">
                    <h2 style="font-size:.9rem;color:var(--text2);font-weight:600;margin-bottom:.5rem"><i class="bi bi-lightning-charge" style="color:var(--amber)"></i> Templates Prontos</h2>
                    <div class="tpl-grid" id="tplGrid"></div>
                </div>
                <div>
                    <h2 style="font-size:.9rem;color:var(--text2);font-weight:600;margin-bottom:.5rem"><i class="bi bi-folder" style="color:var(--primary)"></i> Minhas Planilhas</h2>
                    <div class="sheets-grid" id="sheetsGrid">
                        <div class="empty"><i class="bi bi-table"></i>Nenhuma planilha ainda<p>Use um template ou crie do zero</p></div>
                    </div>
                </div>
            </div>

            <!-- VIEW: EDITOR -->
            <div class="view" id="viewEditor">
                <div class="card" style="padding:.75rem 1rem">
                    <div class="editor-bar">
                        <button class="btn btn-secondary btn-sm" id="btnBack"><i class="bi bi-arrow-left"></i> Voltar</button>
                        <input class="editor-title" id="editorTitle" placeholder="Nome da planilha" maxlength="100">
                        <div class="autosave-indicator" id="autosave"><i class="bi bi-check-circle"></i> Salvo</div>
                        <span id="cellRef" style="font-size:.72rem;color:var(--text3);margin-left:.5rem;font-family:'Fira Code',monospace;background:var(--bg2);padding:.15rem .4rem;border-radius:4px;display:none"></span>
                    </div>
                    <input class="editor-desc" id="editorDesc" placeholder="Descrição (opcional)" maxlength="500">
                    <div class="editor-tools" style="margin:.6rem 0">
                        <button class="btn btn-secondary btn-sm" id="btnUndo" title="Desfazer (Ctrl+Z)"><i class="bi bi-arrow-counterclockwise"></i></button>
                        <button class="btn btn-secondary btn-sm" id="btnRedo" title="Refazer (Ctrl+Y)"><i class="bi bi-arrow-clockwise"></i></button>
                        <span style="border-left:1px solid var(--border);margin:0 .2rem"></span>
                        <button class="btn btn-secondary btn-sm" id="btnAddRow"><i class="bi bi-plus"></i> Linha</button>
                        <button class="btn btn-secondary btn-sm" id="btnAddCol"><i class="bi bi-plus"></i> Coluna</button>
                        <button class="btn btn-secondary btn-sm" id="btnDelRow"><i class="bi bi-dash"></i> Linha</button>
                        <button class="btn btn-secondary btn-sm" id="btnDelCol"><i class="bi bi-dash"></i> Coluna</button>
                        <span style="border-left:1px solid var(--border);margin:0 .2rem"></span>
                        <button class="btn btn-secondary btn-sm" id="btnDuplicate"><i class="bi bi-copy"></i> Duplicar</button>
                        <button class="btn btn-secondary btn-sm" id="btnChart"><i class="bi bi-bar-chart"></i> Gráfico</button>
                        <button class="btn btn-secondary btn-sm" id="btnFindReplace" title="Localizar e Substituir (Ctrl+H)"><i class="bi bi-search"></i> Localizar</button>
                        <span style="border-left:1px solid var(--border);margin:0 .2rem"></span>
                        <div style="position:relative;display:inline-block" id="exportDropdown">
                            <button class="btn btn-primary btn-sm" id="btnSaveAs"><i class="bi bi-save"></i> Salvar Como <i class="bi bi-caret-down-fill" style="font-size:.6rem"></i></button>
                            <div id="exportMenu" style="display:none;position:absolute;top:100%;left:0;margin-top:.3rem;background:var(--card);border:1px solid var(--border);border-radius:8px;min-width:180px;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.3)">
                                <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:flex-start;border:0;border-radius:0;padding:.5rem .7rem" id="btnExportCSV"><i class="bi bi-filetype-csv"></i> Exportar CSV</button>
                                <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:flex-start;border:0;border-radius:0;padding:.5rem .7rem" id="btnExportJSON"><i class="bi bi-filetype-json"></i> Exportar JSON</button>
                                <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:flex-start;border:0;border-radius:0;padding:.5rem .7rem" id="btnExportXLS"><i class="bi bi-file-earmark-spreadsheet"></i> Exportar Excel (.xls)</button>

    <div class="ctx-menu" id="ctxMenu">

        <button id="ctxInsertRowBelow"><i class="bi bi-arrow-bar-down"></i> Inserir linha abaixo</button>

        <button id="ctxInsertColRight"><i class="bi bi-arrow-bar-right"></i> Inserir coluna à direita</button>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>

    <script>
    const TOKEN = localStorage.getItem('access_token');
    if(!TOKEN) window.location.href='index.html';
    const $=id=>document.getElementById(id);
    function headers(){return{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}}
    async function api(path,opts={}){
        const r=await fetch(APP_CONFIG.API_URL+path,{...opts,headers:{...headers(),...(opts.headers||{})}});
        if(r.status===401){localStorage.clear();location.href='index.html';return}
        if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Erro')}
        return r.json();
    }
    function toast(msg,type='success'){const t=$('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3000)}
    function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

    // Sidebar mobile
    $('menuBtn').onclick=()=>{$('sidebar').classList.toggle('open');$('sidebarOverlay').classList.toggle('open')};
    $('sidebarOverlay').onclick=()=>{$('sidebar').classList.remove('open');$('sidebarOverlay').classList.remove('open')};
    $('navLogout').onclick=e=>{e.preventDefault();localStorage.clear();location.href='index.html'};
    if($('bnLogout'))$('bnLogout').onclick=e=>{e.preventDefault();localStorage.clear();location.href='index.html'};
    // Offline bar
    function updateOnline(){$('offlineBar').classList.toggle('show',!navigator.onLine)}
    window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);updateOnline();

    /* ═══ SEARCH SHEETS/TEMPLATES ═══ */
    $('sheetSearch').oninput = e => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderTemplates();
        renderSheets();
    };

    /* ═══ STATE ═══ */
    let templates = [];
    let sheets = [];
    let searchQuery = '';
    let currentSheet = null; // {id, nome, descricao, dados:{columns,rows}}
    let autoSaveTimer = null;
    let deleteSheetId = null;
    let sortCol = -1;
    let sortDir = 'none'; // none, asc, desc
    let filters = {}; // {colIndex: 'text'}
    let miniChartInstance = null;

    /* ═══ VIEWS ═══ */
    function showView(v){
        document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
        $(v).classList.add('active');
        if(v==='viewList'){
            $('pageTitle').textContent='Planilhas';
            $('topbarRight').style.display='';
        } else {
            $('pageTitle').textContent='Editor';
            $('topbarRight').style.display='none';
        }
    }

    /* ═══ LOAD TEMPLATES ═══ */
    async function loadTemplates(){
        try{
            templates = await api('/spreadsheets/templates');
        }catch{
            templates = [];
        }
        renderTemplates();
    }

    function renderTemplates(){
        const g = $('tplGrid');
        if (!g) return;
        let filtered = templates;
        if (searchQuery) {
            filtered = templates.filter(t =>
                (t.nome||'').toLowerCase().includes(searchQuery) ||
                (t.descricao||'').toLowerCase().includes(searchQuery)
            );
        }
        if(!filtered.length){g.innerHTML='<div style="color:var(--text3);font-size:.8rem">'+(searchQuery?'Nenhum template encontrado':'Sem templates disponíveis')+'</div>';return}
        g.innerHTML = filtered.map(t=>{
            const origIdx = templates.indexOf(t);
            return `
            <div class="tpl-card" onclick="useTemplate(${origIdx})" style="cursor:pointer">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${t.cor}"></div>
                <div class="tpl-icon" style="background:${t.cor}"><i class="bi ${t.icone}"></i></div>
                <div class="tpl-name">${esc(t.nome)}</div>
                <div class="tpl-desc">${esc(t.descricao)}</div>
                <div class="tpl-badge">Template</div>
            </div>`;
        }).join('');
    }

    async function useTemplate(idx){
        const t = templates[idx];
        if(!t)return;
        try{
            const body = {nome: t.nome, descricao: t.descricao, dados: t.dados};
            if(navigator.onLine){
                const saved = await api('/spreadsheets',{method:'POST',body:JSON.stringify(body)});
                await OfflineDB.put('spreadsheets', saved);
                openEditor(saved);
            } else {
                const local = {id:'local_'+Date.now(), ...body, _offline:true, created_at:new Date().toISOString(), updated_at:new Date().toISOString()};
                await OfflineDB.put('spreadsheets', local);
                await SyncEngine.queueAction({type:'create', store:'spreadsheets', endpoint:'/spreadsheets', data:body, localId:local.id});
                openEditor(local);
                toast('Planilha criada offline','warning');
            }
            loadSheets();
        }catch(err){toast(err.message,'danger')}
    }

    /* ═══ LOAD SHEETS ═══ */
    async function loadSheets(){
        try{
            if(navigator.onLine){
                sheets = await api('/spreadsheets');
                await OfflineDB.putAll('spreadsheets', sheets);
            } else {
                sheets = await OfflineDB.getAll('spreadsheets');
            }
        }catch{
            sheets = await OfflineDB.getAll('spreadsheets').catch(()=>[]);
        }
        renderSheets();
    }

    function renderSheets(){
        const g = $('sheetsGrid');
        if (!g) return;
        let filtered = sheets;
        if (searchQuery) {
            filtered = sheets.filter(s =>
                (s.nome||'').toLowerCase().includes(searchQuery) ||
                (s.descricao||'').toLowerCase().includes(searchQuery)
            );
        }
        if(!filtered.length){
            if(searchQuery){g.innerHTML='<div class="empty"><i class="bi bi-search"></i>Nenhuma planilha encontrada<p>Tente outro termo de busca</p></div>'}
            else{g.innerHTML='<div class="empty"><i class="bi bi-table"></i>Nenhuma planilha ainda<p>Use um template ou crie do zero</p></div>'}
            return;
        }
        g.innerHTML = filtered.map(s=>`
            <div class="sheet-card" onclick="openSheetById('${s.id}')">
                <div class="sheet-actions">
                    <button class="sheet-del" onclick="event.stopPropagation();duplicateSheet('${s.id}')" title="Duplicar"><i class="bi bi-copy"></i></button>
                    <button class="sheet-del" onclick="event.stopPropagation();askDeleteSheet('${s.id}')" title="Excluir"><i class="bi bi-trash3"></i></button>
                </div>
                <div class="sheet-name">${esc(s.nome)}${s._offline?' <i class="bi bi-cloud-arrow-up" style="color:var(--amber);font-size:.7rem"></i>':''}</div>
                <div class="sheet-desc">${esc(s.descricao||'')}</div>
                <div class="sheet-meta">
                    <span><i class="bi bi-clock"></i> ${s.updated_at ? new Date(s.updated_at).toLocaleDateString('pt-BR') : '—'}</span>
                </div>
            </div>
        `).join('');
    }

    /* ═══ OPEN SHEET ═══ */
    async function openSheetById(id){
        try{
            let sheet;
            if(navigator.onLine && !id.startsWith('local_')){
                sheet = await api('/spreadsheets/'+id);
                await OfflineDB.put('spreadsheets', sheet);
            } else {
                sheet = await OfflineDB.get('spreadsheets', id);
            }
            if(sheet) openEditor(sheet);
            else toast('Planilha não encontrada','danger');
        }catch(err){
            const local = await OfflineDB.get('spreadsheets', id);
            if(local) openEditor(local);
            else toast(err.message,'danger');
        }
    }

    function openEditor(sheet){
        currentSheet = JSON.parse(JSON.stringify(sheet));
        if(!currentSheet.dados) currentSheet.dados = {columns:[], rows:[]};
        if(!currentSheet.dados.columns) currentSheet.dados.columns = [];
        if(!currentSheet.dados.rows) currentSheet.dados.rows = [];
        sortCol = -1; sortDir = 'none'; filters = {};
        undoStack.length = 0; redoStack.length = 0;
        if(miniChartInstance){miniChartInstance.destroy();miniChartInstance=null}
        $('miniChartWrap').classList.remove('show');
        $('editorTitle').value = currentSheet.nome || '';
        $('editorDesc').value = currentSheet.descricao || '';
        renderGrid();
        showView('viewEditor');
        setAutoSaveStatus('saved');
    }

    /* ═══ FORMULA ENGINE ═══ */
    function evalFormula(formula, colIndex, rows, cols) {
        const f = formula.toUpperCase().trim();
        const match = f.match(/^=(\w+)\(([^)]*)\)$/);
        if (!match) return formula;
        const fn = match[1];
        const arg = match[2].trim();
        // Find column by id (e.g. "c2") or by index
        let targetCol = -1;
        if (/^C\d+$/.test(arg)) {
            const cid = arg.toLowerCase();
            targetCol = cols.findIndex(c => c.id === cid);
        } else {
            const n = parseInt(arg);
            if (!isNaN(n) && n >= 1 && n <= cols.length) targetCol = n - 1;
        }
        if (targetCol < 0) return '#REF!';
        const nums = rows.map(r => parseFloat(r[targetCol])).filter(v => !isNaN(v));
        if (fn === 'SUM') return nums.reduce((a, b) => a + b, 0);
        if (fn === 'AVG' || fn === 'AVERAGE' || fn === 'MEDIA') return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : 0;
        if (fn === 'COUNT' || fn === 'CONT') return nums.length;
        if (fn === 'MAX') return nums.length ? Math.max(...nums) : 0;
        if (fn === 'MIN') return nums.length ? Math.min(...nums) : 0;
        return '#FUNC!';
    }

    function getCellDisplay(val, colIndex, rows, cols, colType) {
        if (typeof val === 'string' && val.startsWith('=')) {
            const result = evalFormula(val, colIndex, rows, cols);
            if (typeof result === 'number') {
                if (colType === 'currency') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(result);
                return result.toLocaleString('pt-BR', { maximumFractionDigits: 2 });
            }
            return result;
        }
        return null; // not a formula
    }

    /* ═══ GRID RENDER ═══ */
    function renderGrid(){
        const cols = currentSheet.dados.columns;
        let rows = currentSheet.dados.rows;
        const thead = document.querySelector('#gridTable thead');
        const tbody = document.querySelector('#gridTable tbody');

        // Build row indices (for sorting/filtering while preserving original indices)
        let indices = rows.map((_, i) => i);

        // Apply filters
        Object.keys(filters).forEach(ci => {
            const q = (filters[ci] || '').toLowerCase();
            if (!q) return;
            const c = parseInt(ci);
            indices = indices.filter(i => {
                const val = String(rows[i][c] || '').toLowerCase();
                return val.includes(q);
            });
        });

        // Apply sorting
        if (sortCol >= 0 && sortDir !== 'none') {
            const type = cols[sortCol]?.type;
            indices.sort((a, b) => {
                let va = rows[a][sortCol], vb = rows[b][sortCol];
                if (type === 'number' || type === 'currency') {
                    va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
                } else {
                    va = String(va || '').toLowerCase(); vb = String(vb || '').toLowerCase();
                }
                if (va < vb) return sortDir === 'asc' ? -1 : 1;
                if (va > vb) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // Header with sort buttons
        let hhtml = '<tr><th class="row-num">#</th>';
        cols.forEach((c, ci) => {
            const sortCls = sortCol === ci ? (sortDir === 'asc' ? 'asc' : sortDir === 'desc' ? 'desc' : '') : '';
            hhtml += `<th><div style="display:flex;align-items:center;gap:.3rem">
                <input class="col-name" value="${esc(c.name)}" data-ci="${ci}" maxlength="30" style="min-width:70px;flex:1">
                <button class="sort-btn ${sortCls}" data-sort="${ci}" title="Ordenar"><i class="bi bi-arrow-down-short"></i></button>
            </div>
            <select class="col-name" data-type="${ci}" style="font-size:.6rem;background:none;border:none;color:var(--text3);outline:none;cursor:pointer;margin-top:2px">
                <option value="text" ${c.type === 'text' ? 'selected' : ''}>Texto</option>
                <option value="number" ${c.type === 'number' ? 'selected' : ''}>Número</option>
                <option value="currency" ${c.type === 'currency' ? 'selected' : ''}>Moeda</option>
                <option value="date" ${c.type === 'date' ? 'selected' : ''}>Data</option>
            </select><div class="col-resize-handle" data-resize="${ci}"></div></th>`;
        });
        hhtml += '</tr>';
        // Filter row
        hhtml += '<tr class="filter-row"><th class="row-num"><i class="bi bi-funnel" style="font-size:.65rem"></i></th>';
        cols.forEach((c, ci) => {
            hhtml += `<th><input class="filter-input" data-fc="${ci}" placeholder="Filtrar…" value="${esc(filters[ci] || '')}"></th>`;
        });
        hhtml += '</tr>';
        thead.innerHTML = hhtml;

        // Body (use filtered/sorted indices)
        let bhtml = '';
        indices.forEach((ri, displayIdx) => {
            bhtml += `<tr><td class="row-num">${displayIdx + 1}</td>`;
            cols.forEach((c, ci) => {
                const rawVal = rows[ri][ci] !== undefined && rows[ri][ci] !== null ? rows[ri][ci] : '';
                const isFormula = typeof rawVal === 'string' && rawVal.startsWith('=');
                const display = isFormula ? getCellDisplay(rawVal, ci, rows, cols, c.type) : null;
                const cls = (c.type === 'currency' || c.type === 'number') ? ' ' + c.type : '';
                // Conditional coloring for currency/number
                let colorCls = '';
                const numVal = parseFloat(isFormula && typeof display === 'string' ? display.replace(/[^0-9,.-]/g, '').replace(',', '.') : rawVal);
                if ((c.type === 'currency' || c.type === 'number') && !isNaN(numVal)) {
                    if (numVal > 0) colorCls = ' positive';
                    else if (numVal < 0) colorCls = ' negative';
                }
                const formulaCls = isFormula ? ' formula' : '';
                const showVal = isFormula ? (display !== null ? display : rawVal) : esc(String(rawVal));
                bhtml += `<td><input class="grid-cell${cls}${colorCls}${formulaCls}" value="${esc(String(rawVal))}" ${isFormula ? 'title="' + esc(showVal) + '"' : ''} data-r="${ri}" data-c="${ci}"></td>`;
            });
            bhtml += '</tr>';
        });
        tbody.innerHTML = bhtml;

        // Info
        $('gridInfo').textContent = `${indices.length}/${rows.length} linhas × ${cols.length} colunas`;
        updateSums();

        // Events — cells
        let cellUndoPushed = false;
        tbody.querySelectorAll('.grid-cell').forEach(cell => {
            cell.onfocus = () => {
                if (!cellUndoPushed) { pushUndo(); cellUndoPushed = true; }
                const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                const raw = currentSheet.dados.rows[r][c];
                if (typeof raw === 'string' && raw.startsWith('=')) cell.value = raw;
                // Show cell reference
                const colLetter = String.fromCharCode(65 + (c % 26));
                $('cellRef').textContent = colLetter + (r + 1);
                $('cellRef').style.display = 'inline';
            };
            cell.oninput = () => {
                const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                let v = cell.value;
                const type = cols[c]?.type;
                if (v.startsWith('=')) {
                    currentSheet.dados.rows[r][c] = v;
                } else if (type === 'number' || type === 'currency') {
                    const n = parseFloat(v.replace(',', '.'));
                    currentSheet.dados.rows[r][c] = isNaN(n) ? v : n;
                } else {
                    currentSheet.dados.rows[r][c] = v;
                }
                scheduleAutoSave();
                updateSums();
            };
            cell.onkeydown = e => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                    let nc = c + 1, nr = r;
                    if (nc >= cols.length) { nc = 0; nr = indices[indices.indexOf(r) + 1]; }
                    if (nr === undefined) return;
                    const next = tbody.querySelector(`input[data-r="${nr}"][data-c="${nc}"]`);
                    if (next) next.focus();
                }
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                    const ni = indices.indexOf(r) + 1;
                    if (ni >= indices.length) return;
                    const next = tbody.querySelector(`input[data-r="${indices[ni]}"][data-c="${c}"]`);
                    if (next) next.focus();
                }
            };
            cell.onblur = () => {
                cellUndoPushed = false;
                const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                const raw = currentSheet.dados.rows[r][c];
                if (typeof raw === 'string' && raw.startsWith('=')) {
                    const result = getCellDisplay(raw, c, currentSheet.dados.rows, cols, cols[c].type);
                    if (result !== null) cell.value = result;
                }
            };
        });

        // Column name events
        thead.querySelectorAll('input.col-name').forEach(inp => {
            inp.oninput = () => {
                const ci = parseInt(inp.dataset.ci);
                currentSheet.dados.columns[ci].name = inp.value;
                scheduleAutoSave();
            };
        });
        // Column type events
        thead.querySelectorAll('select.col-name').forEach(sel => {
            sel.onchange = () => {
                const ci = parseInt(sel.dataset.type);
                currentSheet.dados.columns[ci].type = sel.value;
                scheduleAutoSave();
                renderGrid();
            };
        });
        // Sort events
        thead.querySelectorAll('.sort-btn').forEach(btn => {
            btn.onclick = () => {
                const ci = parseInt(btn.dataset.sort);
                if (sortCol === ci) {
                    sortDir = sortDir === 'none' ? 'asc' : sortDir === 'asc' ? 'desc' : 'none';
                } else {
                    sortCol = ci; sortDir = 'asc';
                }
                renderGrid();
            };
        });
        // Filter events
        thead.querySelectorAll('.filter-input').forEach(inp => {
            inp.oninput = () => {
                const ci = inp.dataset.fc;
                filters[ci] = inp.value;
                renderGrid();
                // Re-focus this filter after re-render
                setTimeout(() => {
                    const el = document.querySelector(`.filter-input[data-fc="${ci}"]`);
                    if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
                }, 10);
            };
        });

        // Column resize drag
        thead.querySelectorAll('.col-resize-handle').forEach(handle => {
            handle.onmousedown = (e) => {
                e.preventDefault(); e.stopPropagation();
                const ci = parseInt(handle.dataset.resize);
                const th = handle.parentElement;
                const startX = e.clientX;
                const startW = th.offsetWidth;
                handle.classList.add('active');
                const onMove = (ev) => {
                    const diff = ev.clientX - startX;
                    const newW = Math.max(60, startW + diff);
                    th.style.width = newW + 'px';
                    th.style.minWidth = newW + 'px';
                };
                const onUp = () => {
                    handle.classList.remove('active');
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };
        });

        // Show formula results for all formula cells on initial render
        tbody.querySelectorAll('.grid-cell.formula').forEach(cell => {
            const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
            const raw = currentSheet.dados.rows[r][c];
            const result = getCellDisplay(raw, c, currentSheet.dados.rows, cols, cols[c].type);
            if (result !== null) cell.value = result;
        });
    }

    function updateSums(){
        const cols = currentSheet.dados.columns;
        const rows = currentSheet.dados.rows;
        const sums = [];
        cols.forEach((c,ci)=>{
            if(c.type==='currency'||c.type==='number'){
                let s = 0;
                rows.forEach(r=>{const v=parseFloat(r[ci]);if(!isNaN(v))s+=v});
                const fmt = c.type==='currency' ? new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(s) : s.toLocaleString('pt-BR');
                sums.push(`${c.name}: ${fmt}`);
            }
        });
        $('gridSum').textContent = sums.join('  |  ');
    }

    async function saveSheet(){

        currentSheet.descricao = $('editorDesc').value.trim();
        const body = {nome:currentSheet.nome, descricao:currentSheet.descricao, dados:currentSheet.dados};
        try{
            if(navigator.onLine && !currentSheet.id.startsWith('local_')){
                await api('/spreadsheets/'+currentSheet.id,{method:'PUT',body:JSON.stringify(body)});
            } else {
                await OfflineDB.put('spreadsheets', {...currentSheet, ...body, updated_at:new Date().toISOString()});

    function renderMiniChart() {
        if (miniChartInstance) { miniChartInstance.destroy(); miniChartInstance = null; }
        if (!currentSheet) return;
        const cols = currentSheet.dados.columns;
        const rows = currentSheet.dados.rows;
        // Find first text column for labels and numeric columns for data
        let labelCol = cols.findIndex(c => c.type === 'text');
        const numCols = cols.map((c, i) => (c.type === 'number' || c.type === 'currency') ? i : -1).filter(i => i >= 0);
        if (numCols.length === 0) { toast('Nenhuma coluna numérica para gráfico', 'warning'); return; }
        const labels = rows.map((r, i) => labelCol >= 0 ? (r[labelCol] || 'Linha ' + (i + 1)) : 'Linha ' + (i + 1));
        const COLORS = ['#6366f1', '#22c55e', '#ef4444', '#f59e0b', '#06b6d4', '#ec4899', '#8b5cf6', '#f97316'];
        const datasets = numCols.slice(0, 4).map((ci, idx) => ({
            label: cols[ci].name,
            data: rows.map(r => { const v = parseFloat(r[ci]); return isNaN(v) ? 0 : v; }),
            backgroundColor: COLORS[idx % COLORS.length] + '99',
            borderColor: COLORS[idx % COLORS.length],
            borderWidth: 2,
            borderRadius: 6,
            barPercentage: 0.6,
        }));
        const chartType = numCols.length === 1 && rows.length <= 8 ? 'bar' : rows.length > 12 ? 'line' : 'bar';
        const ctx = $('miniChart').getContext('2d');
        miniChartInstance = new Chart(ctx, {
            type: chartType,
            data: { labels, datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#94a3b8', font: { size: 9 }, maxTicksLimit: 12 }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8', font: { size: 9 } }, grid: { color: 'rgba(30,41,59,.5)' }, border: { dash: [3, 3] } }
                },
                plugins: {
                    legend: { labels: { color: '#e2e8f0', padding: 8, font: { size: 10 }, usePointStyle: true, pointStyle: 'circle' } },
                    tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.raw.toLocaleString('pt-BR')}` } }
                }
            }
        });
    }

    /* ═══ UNDO / REDO ═══ */
    const undoStack = [];
    const redoStack = [];
    const MAX_UNDO = 50;

    function pushUndo() {
        if (!currentSheet) return;
        undoStack.push(JSON.stringify(currentSheet.dados));
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack.length = 0; // clear redo on new action
    }

    function doUndo() {
        if (!currentSheet || undoStack.length === 0) return;
        redoStack.push(JSON.stringify(currentSheet.dados));
        currentSheet.dados = JSON.parse(undoStack.pop());
        renderGrid();
        scheduleAutoSave();
    }

    function doRedo() {
        if (!currentSheet || redoStack.length === 0) return;
        undoStack.push(JSON.stringify(currentSheet.dados));
        currentSheet.dados = JSON.parse(redoStack.pop());
        renderGrid();
        scheduleAutoSave();
    }

    $('btnUndo').onclick = doUndo;
    $('btnRedo').onclick = doRedo;

    /* ═══ KEYBOARD SHORTCUTS ═══ */
    document.addEventListener('keydown', e => {
        if (!currentSheet) return;
        // Ctrl+Z = Undo
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
        // Ctrl+Y or Ctrl+Shift+Z = Redo
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
        // Ctrl+S = Force save
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveSheet(); }
        // Ctrl+P = Print
        if ((e.ctrlKey || e.metaKey) && e.key === 'p' && $('viewEditor').classList.contains('active')) { e.preventDefault(); printSheet(); }
        // Ctrl+H = Find & Replace
        if ((e.ctrlKey || e.metaKey) && e.key === 'h' && $('viewEditor').classList.contains('active')) { e.preventDefault(); toggleFindReplace(); }
        // Ctrl+F = Find (open Find & Replace)
        if ((e.ctrlKey || e.metaKey) && e.key === 'f' && $('viewEditor').classList.contains('active')) { e.preventDefault(); if(!findReplaceOpen) toggleFindReplace(); else $('findInput').focus(); }
    });

    /* ═══ IMPORT CSV ═══ */
    $('btnImportCSV').onclick = () => {
        $('importMenu').style.display = 'none';
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv,text/csv';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 1) { toast('CSV vazio', 'warning'); return; }
                // Parse CSV (handle quoted fields)
                function parseCSVLine(line) {
                    const result = []; let current = ''; let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const ch = line[i];
                        if (inQuotes) {
                            if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
                            else if (ch === '"') inQuotes = false;
                            else current += ch;
                        } else {
                            if (ch === '"') inQuotes = true;
                            else if (ch === ',' || ch === ';') { result.push(current.trim()); current = ''; }
                            else current += ch;
                        }
                    }
                    result.push(current.trim());
                    return result;
                }
                const headerRow = parseCSVLine(lines[0]);
                const columns = headerRow.map((h, i) => ({
                    id: 'c' + (i + 1),
                    name: h || 'Coluna ' + (i + 1),
                    type: 'text'
                }));
                const rows = [];
                for (let i = 1; i < lines.length; i++) {
                    const vals = parseCSVLine(lines[i]);
                    const row = columns.map((_, ci) => vals[ci] || '');
                    // Auto-detect: if all numeric in a col, mark col type
                    rows.push(row);
                }
                // Auto-detect column types
                columns.forEach((col, ci) => {
                    const nums = rows.filter(r => r[ci] && !isNaN(parseFloat(String(r[ci]).replace(',', '.')))).length;
                    if (nums > rows.length * 0.7) col.type = 'number';
                });
                const nome = file.name.replace(/\.csv$/i, '');
                const body = { nome, descricao: 'Importado de CSV', dados: { columns, rows } };
                if (navigator.onLine) {
                    const saved = await api('/spreadsheets', { method: 'POST', body: JSON.stringify(body) });
                    await OfflineDB.put('spreadsheets', saved);
                    openEditor(saved);
                } else {
                    const local = { id: 'local_' + Date.now(), ...body, _offline: true, created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
                    await OfflineDB.put('spreadsheets', local);
                    await SyncEngine.queueAction({ type: 'create', store: 'spreadsheets', endpoint: '/spreadsheets', data: body, localId: local.id });
                    openEditor(local);
                }
                loadSheets();
                toast('CSV importado! ' + rows.length + ' linhas');
            } catch (err) { toast('Erro ao importar CSV: ' + err.message, 'danger'); }
        };
        input.click();
    };

                loadSheets();
                toast('JSON importado com sucesso!');
            } catch (err) { toast('Erro ao importar JSON: ' + err.message, 'danger'); }
        };
        input.click();
    };

    /* ═══ FIND & REPLACE (Ctrl+H) ═══ */
    let findReplaceOpen = false;
    function toggleFindReplace() {
        if (!currentSheet || !$('viewEditor').classList.contains('active')) return;
        findReplaceOpen = !findReplaceOpen;
        let panel = $('findReplacePanel');
        if (!panel) {
            // Create panel dynamically
            panel = document.createElement('div');
            panel.id = 'findReplacePanel';
            panel.style.cssText = 'display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;margin-bottom:.5rem;position:relative';
            panel.innerHTML = `
                <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
                    <div style="flex:1;min-width:150px;position:relative">
                        <input id="findInput" class="form-input" placeholder="Buscar nas células…" style="padding-right:2.5rem;font-size:.82rem">
                        <span id="findCount" style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%);font-size:.65rem;color:var(--text3)"></span>
                    </div>
                    <div style="flex:1;min-width:150px">
                        <input id="replaceInput" class="form-input" placeholder="Substituir por…" style="font-size:.82rem">
                    </div>
                    <button class="btn btn-secondary btn-sm" id="btnFindNext"><i class="bi bi-arrow-down-short"></i> Próximo</button>
                    <button class="btn btn-secondary btn-sm" id="btnReplaceOne"><i class="bi bi-arrow-repeat"></i> Substituir</button>
                    <button class="btn btn-primary btn-sm" id="btnReplaceAll"><i class="bi bi-arrow-repeat"></i> Substituir Todos</button>
                    <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:.2rem" id="btnCloseFR"><i class="bi bi-x-lg"></i></button>
                </div>
            `;
            const editorCard = $('viewEditor').querySelector('.card');
            editorCard.insertBefore(panel, $('gridWrap'));
            // Events
            $('btnCloseFR').onclick = () => { panel.style.display = 'none'; findReplaceOpen = false; clearFindHighlights(); };
            $('findInput').oninput = () => findInCells();
            $('btnFindNext').onclick = () => findNextCell();
            $('btnReplaceOne').onclick = () => replaceCurrentCell();
            $('btnReplaceAll').onclick = () => replaceAllCells();
        }
        panel.style.display = findReplaceOpen ? 'block' : 'none';
        if (findReplaceOpen) { $('findInput').focus(); $('findInput').select(); }
        else clearFindHighlights();
    }

    let findMatches = [];
    let findMatchIdx = -1;

    function findInCells() {
        clearFindHighlights();
        const q = ($('findInput').value || '').toLowerCase();
        findMatches = []; findMatchIdx = -1;
        if (!q || !currentSheet) { $('findCount').textContent = ''; return; }
        const rows = currentSheet.dados.rows;
        rows.forEach((r, ri) => {
            r.forEach((v, ci) => {
                if (String(v || '').toLowerCase().includes(q)) {
                    findMatches.push({ r: ri, c: ci });
                    const cell = document.querySelector(`#gridTable input[data-r="${ri}"][data-c="${ci}"]`);
                    if (cell) cell.style.boxShadow = 'inset 0 0 0 2px var(--amber)';
                }
            });
        });
        $('findCount').textContent = findMatches.length ? findMatches.length + ' encontrado' + (findMatches.length > 1 ? 's' : '') : 'Nenhum';
        if (findMatches.length) findNextCell();
    }

    function findNextCell() {
        if (!findMatches.length) return;
        // Remove previous highlight
        if (findMatchIdx >= 0) {
            const prev = findMatches[findMatchIdx];
            const prevCell = document.querySelector(`#gridTable input[data-r="${prev.r}"][data-c="${prev.c}"]`);
            if (prevCell) prevCell.style.boxShadow = 'inset 0 0 0 2px var(--amber)';
        }
        findMatchIdx = (findMatchIdx + 1) % findMatches.length;
        const m = findMatches[findMatchIdx];
        const cell = document.querySelector(`#gridTable input[data-r="${m.r}"][data-c="${m.c}"]`);
        if (cell) {
            cell.style.boxShadow = 'inset 0 0 0 2px var(--primary)';
            cell.scrollIntoView({ block: 'center', behavior: 'smooth' });
            cell.focus();
        }
        $('findCount').textContent = (findMatchIdx + 1) + '/' + findMatches.length;
    }

    function replaceCurrentCell() {
        if (findMatchIdx < 0 || !findMatches.length) return;
        const q = $('findInput').value;
        const rep = $('replaceInput').value;
        const m = findMatches[findMatchIdx];
        pushUndo();
        const val = String(currentSheet.dados.rows[m.r][m.c] || '');
        currentSheet.dados.rows[m.r][m.c] = val.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), rep);
        renderGrid();
        scheduleAutoSave();
        findInCells();
        toast('Substituído!');
    }

    function replaceAllCells() {
        if (!findMatches.length) return;
        const q = $('findInput').value;
        const rep = $('replaceInput').value;
        if (!q) return;
        pushUndo();
        const regex = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        let count = 0;
        currentSheet.dados.rows.forEach(r => {
            r.forEach((v, ci) => {
                const str = String(v || '');
                if (str.toLowerCase().includes(q.toLowerCase())) {
                    r[ci] = str.replace(regex, rep);
                    count++;
                }
            });
        });
        renderGrid();
        scheduleAutoSave();
        findInCells();
        toast(count + ' célula' + (count > 1 ? 's' : '') + ' substituída' + (count > 1 ? 's' : ''));
    }

    function clearFindHighlights() {
        document.querySelectorAll('#gridTable .grid-cell').forEach(c => { c.style.boxShadow = ''; });
        findMatches = []; findMatchIdx = -1;
    }

    /* ═══ CONTEXT MENU ═══ */
    let ctxR = -1, ctxC = -1;
    document.addEventListener('contextmenu', e => {
        const cell = e.target.closest('.grid-cell');
        if (!cell || !currentSheet) return;
        e.preventDefault();
        ctxR = parseInt(cell.dataset.r);
        ctxC = parseInt(cell.dataset.c);
        const menu = $('ctxMenu');
        menu.classList.add('open');
        menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 280) + 'px';
    });
    document.addEventListener('click', () => $('ctxMenu').classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') $('ctxMenu').classList.remove('open'); });

    $('ctxInsertRowAbove').onclick = () => {
        if (ctxR < 0 || !currentSheet) return;
        pushUndo();
        const ncols = currentSheet.dados.columns.length;
        currentSheet.dados.rows.splice(ctxR, 0, new Array(ncols).fill(''));
        renderGrid(); scheduleAutoSave();
    };
    $('ctxInsertRowBelow').onclick = () => {
        if (ctxR < 0 || !currentSheet) return;
        pushUndo();
        const ncols = currentSheet.dados.columns.length;
        currentSheet.dados.rows.splice(ctxR + 1, 0, new Array(ncols).fill(''));
        renderGrid(); scheduleAutoSave();
    };
    $('ctxInsertColLeft').onclick = () => {
        if (ctxC < 0 || !currentSheet) return;
        pushUndo();
        currentSheet.dados.columns.splice(ctxC, 0, { id: 'c' + Date.now(), name: 'Nova Coluna', type: 'text' });
        currentSheet.dados.rows.forEach(r => r.splice(ctxC, 0, ''));
        renderGrid(); scheduleAutoSave();
    };
    $('ctxInsertColRight').onclick = () => {
        if (ctxC < 0 || !currentSheet) return;
        pushUndo();
        currentSheet.dados.columns.splice(ctxC + 1, 0, { id: 'c' + Date.now(), name: 'Nova Coluna', type: 'text' });
        currentSheet.dados.rows.forEach(r => r.splice(ctxC + 1, 0, ''));
        renderGrid(); scheduleAutoSave();
    };
    $('ctxDeleteRow').onclick = () => {
        if (ctxR < 0 || !currentSheet || currentSheet.dados.rows.length <= 1) return;
        pushUndo();
        currentSheet.dados.rows.splice(ctxR, 1);
        renderGrid(); scheduleAutoSave();
    };
    $('ctxDeleteCol').onclick = () => {
        if (ctxC < 0 || !currentSheet || currentSheet.dados.columns.length <= 1) return;
        pushUndo();
        currentSheet.dados.columns.splice(ctxC, 1);
        currentSheet.dados.rows.forEach(r => r.splice(ctxC, 1));
        renderGrid(); scheduleAutoSave();
    };
    $('ctxClearCell').onclick = () => {
        if (ctxR < 0 || ctxC < 0 || !currentSheet) return;
        pushUndo();
        currentSheet.dados.rows[ctxR][ctxC] = '';
        renderGrid(); scheduleAutoSave();
    };

    OfflineDB.open().then(()=>{
        SyncEngine.init();
        loadTemplates();
        loadSheets();
    });
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
    </script>
</body>
</html>
